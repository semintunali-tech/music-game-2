<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Western Music History Quest</title>
<style>
:root {
  --ink:#fff8f0; --gold:#ffd86b; --pink:#ff5ea8; --cyan:#8ae6ff; --green:#7bf1a8; --red:#ff7a9a;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family: Inter, Arial, sans-serif; color:var(--ink); overflow-x:hidden;
  background:
    radial-gradient(circle at 50% 15%, #fff3 0, #fff0 20%),
    linear-gradient(180deg, #7c1137 0%, #431331 28%, #22154f 58%, #0c1028 100%);
}
.curtain {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    repeating-linear-gradient(90deg,#0000 0 4.8%,#00000018 4.8% 5.2%),
    linear-gradient(180deg,#8a1437 0%,#5c0c29 12%,#0000 27%);
}
.floor {
  position:fixed; left:0; right:0; bottom:0; height:24vh; z-index:0;
  background:linear-gradient(180deg,#0000 0,#0005 25%,#110814 100%);
  box-shadow: inset 0 25px 60px #0007;
}
#app { position:relative; z-index:1; min-height:100vh; padding:18px; }
.panel {
  background:#ffffff1a; border:1px solid #ffffff30; border-radius:26px; backdrop-filter:blur(12px);
  box-shadow:0 18px 60px #0006;
}
.startwrap, .winwrap { min-height:calc(100vh - 36px); display:grid; place-items:center; }
.startbox, .winbox { width:min(920px, 96vw); padding:26px; text-align:center; }
.title { font-size:52px; font-weight:900; margin:10px 0 12px; }
.subtitle { font-size:18px; opacity:.9; line-height:1.6; }
.btn {
  border:none; cursor:pointer; border-radius:18px; padding:16px 24px; font-size:18px; font-weight:900;
  background:linear-gradient(135deg,var(--gold),#ff9a5e); color:#2f1532; box-shadow:0 12px 30px #0004;
}
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:18px; }
.charcard { padding:14px; }
.role { font-size:12px; text-transform:uppercase; letter-spacing:.2em; opacity:.75; }
.name { font-size:28px; font-weight:900; margin-top:4px; }
.figure { min-height:280px; display:flex; align-items:center; justify-content:center; position:relative; }
.figure img { max-width:100%; max-height:290px; object-fit:contain; border-radius:18px; display:block; }
.figure.devil img { animation:breath 3s ease-in-out infinite; filter:contrast(1.04) saturate(.95); }
@keyframes breath { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-4px) scale(1.02)} }
.eye {
  position:absolute; width:14px; height:14px; border-radius:50%; background:#ff355d;
  box-shadow:0 0 10px #ff355d, 0 0 24px #ff355d; animation:glow 1.5s infinite;
}
.eye.left { left:43%; top:33%; }
.eye.right { left:55%; top:33%; }
@keyframes glow { 0%,100%{opacity:.45; transform:scale(.9)} 50%{opacity:1; transform:scale(1.22)} }
.bubble { margin-top:10px; padding:12px 14px; border-radius:16px; background:#00000035; border:1px solid #fff2; line-height:1.5; }
.bubble.hint { background:linear-gradient(135deg,#7bf1a822,#8ae6ff22); border-color:#bff7d655; }
.topbar {
  display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; padding:14px 16px; margin-bottom:16px;
}
.progresswrap { flex:1; min-width:260px; }
.bar { margin-top:8px; height:12px; border-radius:999px; background:#fff2; overflow:hidden; }
.fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--pink),var(--cyan)); transition:width .3s ease; }
.stats { display:flex; gap:10px; flex-wrap:wrap; }
.pill { min-width:110px; padding:10px 12px; border-radius:16px; background:#fff2; border:1px solid #fff3; }
.pill b { display:block; font-size:20px; margin-top:2px; }
.main { display:grid; grid-template-columns:240px 1fr 240px; gap:16px; }
.center { padding:18px; }
.dialogue { padding:14px 16px; border-radius:18px; background:#0a0a1938; border:1px solid #fff2; }
.qbox { margin-top:14px; padding:22px; border-radius:24px; background:linear-gradient(135deg,#ffffff18,#ffffff08); border:1px solid #fff2; }
.section { font-size:12px; text-transform:uppercase; letter-spacing:.24em; opacity:.72; }
.question { font-size:30px; font-weight:900; line-height:1.18; margin-top:8px; }
.answers { display:grid; gap:12px; margin-top:16px; }
.answer {
  width:100%; text-align:left; border:none; cursor:pointer; border-radius:20px; padding:16px 18px; font-size:18px; color:var(--ink);
  background:linear-gradient(135deg,#ffffff26,#ffffff12); border:1px solid #fff2; transition:.18s transform,.18s background;
}
.answer:hover { transform:translateY(-2px) scale(1.01); background:#ffffff33; }
.answer:disabled { opacity:.7; cursor:default; }
.feedback { min-height:58px; margin-top:14px; padding:12px 14px; border-radius:16px; display:flex; align-items:center; font-weight:800; }
.good { background:#1d5135aa; border:1px solid #7bf1a855; color:#dfffea; }
.bad { background:#5b1528aa; border:1px solid #ff7a9a55; color:#ffe1ea; }
.cracks { position:fixed; inset:0; pointer-events:none; opacity:0; transition:opacity .18s ease; z-index:3; }
.cracks.show { opacity:1; }
.shake { animation:shake .35s linear 2; }
@keyframes shake { 0%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}100%{transform:translateX(0)} }
.small { font-size:12px; opacity:.76; }
@media (max-width: 980px) {
  .main { grid-template-columns:1fr; }
  .grid2 { grid-template-columns:1fr; }
  .question { font-size:24px; }
  .title { font-size:38px; }
}
</style>
</head>

let audioCtx = null;
function beep(freq, duration, type="sine", gainValue=0.04) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = gainValue;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
  } catch (e) {}
}
function playCorrectSound() {
  beep(660,0.12,"triangle",0.05);
  setTimeout(() => beep(880,0.16,"triangle",0.05), 90);
}
function playWrongSound() {
  beep(220,0.18,"sawtooth",0.05);
  setTimeout(() => beep(165,0.24,"sawtooth",0.05), 120);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function prepareQuestions() {
  return questions.map((q, qi) => {
    const answers = q.a.map((text, i) => ({ text, correct:i===q.c, id:`${qi}-${i}` }));
    return { ...q, answers: shuffle(answers) };
  });
}

let game = null;

function currentHint() {
  if (!game) return figaroHints[0];
  return figaroHints[game.idx % figaroHints.length];
}

            <div class="role">Rival</div>
            <div class="name">Devil</div>
            <div class="figure devil">
              <img src="${DEVIL_IMG}" alt="Devil">
              <div class="eye left"></div>
              <div class="eye right"></div>
            </div>
            <div class="bubble">One mistake. Back to the overture.</div>
          </div>
        </div>
        <div style="margin-top:18px;">
          <button class="btn" onclick="startGame()">Start quest</button>
        </div>
      </div>
    </div>
  `;
}

function startGame() {
  game = {
    qs: prepareQuestions(),
    idx: 0,
    score: 0,
    streak: 0,
    locked: false,
    speaker: "Figaro",
    feedback: ""
  };
  renderGame();
}

function renderGame() {
  const q = game.qs[game.idx];
  const progress = (game.idx / game.qs.length) * 100;
  const feedbackClass = game.feedback ? (game.feedback.includes("Wrong") ? "bad" : "good") : "";
  document.getElementById('app').innerHTML = `
    <div class="${game.feedback.includes('Wrong') ? 'shake' : ''}">
      <div class="topbar panel">
        <div class="progresswrap">
          <div class="small">Question ${game.idx + 1} / ${game.qs.length}</div>
          <div class="bar"><div class="fill" style="width:${progress}%"></div></div>
        </div>
        <div class="stats">
          <div class="pill"><span class="small">Score</span><b>${game.score}</b></div>
          <div class="pill"><span class="small">Streak</span><b>${game.streak}</b></div>
          <div class="pill"><span class="small">Zone</span><b style="font-size:15px">${q.section}</b></div>
        </div>
      </div>

      <div class="main">
        <div class="panel charcard">
          <div class="role">Guide</div>
          <div class="name">Figaro</div>
          <div class="figure"><img src="${FIGARO_IMG}" alt="Figaro"></div>
          <div class="bubble hint"><b>Figaro hint:</b> ${currentHint()}</div>
        </div>

        <div class="panel center">
          <div class="dialogue"><b>${game.speaker}</b>: ${game.feedback || `Trial ${game.idx + 1}: ${q.section}`}</div>
          <div class="qbox">
            <div class="section">${q.section}</div>
            <div class="question">${q.q}</div>
          </div>
          <div class="answers">
            ${q.answers.map((ans, i) => `<button class="answer" ${game.locked ? "disabled" : ""} onclick="pick(${i})">${String.fromCharCode(65+i)}. ${ans.text}</button>`).join("")}
          </div>
          <div class="feedback ${feedbackClass}">${game.feedback || "Choose wisely."}</div>
        </div>

        <div class="panel charcard">
          <div class="role">Rival</div>
          <div class="name">Devil</div>
          <div class="figure devil">
            <img src="${DEVIL_IMG}" alt="Devil">
            <div class="eye left"></div>
            <div class="eye right"></div>
          </div>
          <div class="bubble">Miss once. Back to the overture.</div>
        </div>
      </div>
    </div>
  `;
}

function renderWin() {
  document.getElementById('app').innerHTML = `
    <div class="winwrap">
      <div class="winbox panel">
        <div class="small">Victory screen</div>
        <div class="title">Curtain Call 🎭</div>
        <div class="subtitle">You cleared all ${game.qs.length} questions without collapsing the stage.</div>
        <div class="stats" style="justify-content:center; margin-top:18px;">
          <div class="pill"><span class="small">Final score</span><b>${game.score}</b></div>
          <div class="pill"><span class="small">Streak</span><b>${game.streak}</b></div>
          <div class="pill"><span class="small">Status</span><b>Cleared</b></div>
        </div>
        <div class="grid2" style="margin-top:18px;">
          <div class="panel charcard">
            <div class="name">Figaro</div>
            <div class="figure"><img src="${FIGARO_IMG}" alt="Figaro"></div>
          </div>
          <div class="panel charcard">
            <div class="name">Devil</div>
            <div class="figure devil"><img src="${DEVIL_IMG}" alt="Devil"><div class="eye left"></div><div class="eye right"></div></div>
          </div>
        </div>
        <div style="margin-top:18px;">
          <button class="btn" onclick="startGame()">Play again</button>
        </div>
      </div>
    </div>
  `;
}

function pick(i) {
  if (game.locked) return;
  const q = game.qs[game.idx];
  const chosen = q.answers[i];
  game.locked = true;

  if (chosen.correct) {
    game.score += 1;
    game.streak += 1;
    game.speaker = "Figaro";
    game.feedback = "Correct. The curtain rises for the next scene.";
    playCorrectSound();
    renderGame();
    setTimeout(() => {
      if (game.idx === game.qs.length - 1) {
        renderWin();
        return;
      }
      game.idx += 1;
      game.feedback = "";
      game.locked = false;
      renderGame();
    }, 900);
  } else {
    game.speaker = "Devil";
    game.feedback = "Wrong. The stage cracks, the orchestra panics, and you return to question 1.";
    playWrongSound();
    renderGame();
    showCracks(true);
    setTimeout(() => {
      game.qs = prepareQuestions();
      game.idx = 0;
      game.score = 0;
      game.streak = 0;
      game.feedback = "";
      game.locked = false;
      game.speaker = "Figaro";
      showCracks(false);
      renderGame();
    }, 1200);
  }
}

renderStart();
</script>
</body>
</html>
